<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108" role="img" aria-label="My TV Launcher">
  <title>My TV Launcher</title>

  <!-- Rabbit-ear antenna, behind the casing -->
  <path d="M54,30 L36,10 M54,30 L72,10"
        fill="none" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" />

  <!-- Feet, behind the casing -->
  <path d="M26,86 L38,86 L38,97 L26,97 Z" fill="#37474F" />
  <path d="M70,86 L82,86 L82,97 L70,97 Z" fill="#37474F" />

  <!-- Casing -->
  <path d="M18,28 L90,28 A10,10 0 0 1 100,38 L100,80 A10,10 0 0 1 90,90 L18,90 A10,10 0 0 1 8,80 L8,38 A10,10 0 0 1 18,28 Z"
        fill="#546E7A" />

  <!-- Screen -->
  <path d="M22,36 L70,36 A6,6 0 0 1 76,42 L76,76 A6,6 0 0 1 70,82 L22,82 A6,6 0 0 1 16,76 L16,42 A6,6 0 0 1 22,36 Z"
        fill="#3D5AFE" />

  <!-- Tuning knobs -->
  <path d="M83,48 a5,5 0 1 0 10,0 a5,5 0 1 0 -10,0 Z" fill="#90A4AE" />
  <path d="M83,64 a5,5 0 1 0 10,0 a5,5 0 1 0 -10,0 Z" fill="#90A4AE" />

  <!-- "MY" on the screen -->
  <path d="M24,71 L24,47 L34,59 L44,47 L44,71 M50,47 L59,59 L68,47 M59,59 L59,71"
        fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
