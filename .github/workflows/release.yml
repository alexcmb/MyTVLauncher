name: Release APK

# Build the debug APK and attach it to a GitHub Release whenever a
# version tag (e.g. v2026.7) is pushed. Can also be run manually from the
# Actions tab (a manual run only builds; it does not create a release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Stage APK with version name
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
            "artifacts/JustTvLauncher-${GITHUB_REF_NAME}.apk"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: JustTvLauncher-apk
          path: artifacts/*.apk

      - name: Publish release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
