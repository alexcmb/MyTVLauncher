name: Release APK

# Build the debug APK and attach it to a GitHub Release whenever a
# version tag (e.g. v2026.7) is pushed. Can also be run manually from the
# Actions tab (a manual run only builds; it does not create a release).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Derive version from tag
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            RAW="${GITHUB_REF_NAME#v}"
          else
            RAW="0.0.0"
          fi
          IFS='.' read -r MA MI PA <<< "$RAW"
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
          CODE=$((10#$MA * 10000 + 10#$MI * 100 + 10#$PA))
          echo "name=$RAW" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Version $RAW -> versionCode $CODE"

      - name: Run unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon \
            -PappVersionName=${{ steps.ver.outputs.name }} \
            -PappVersionCode=${{ steps.ver.outputs.code }}

      - name: Stage APK with version name
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
            "artifacts/JustTvLauncher-${GITHUB_REF_NAME}.apk"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: JustTvLauncher-apk
          path: artifacts/*.apk

      - name: Publish release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
