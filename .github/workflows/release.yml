name: Release APK

# Build the signed release APK and attach it to a GitHub Release whenever a version tag
# (e.g. v0.3) is pushed. Can also be run manually from the Actions tab (a manual run only
# builds; it does not create a release).
#
# Signing needs four repository secrets: SIGNING_KEYSTORE_B64 (the keystore, base64), plus
# SIGNING_STORE_PASSWORD, SIGNING_KEY_ALIAS and SIGNING_KEY_PASSWORD. The keystore is never
# in the repo.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Derive version from tag
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            RAW="${GITHUB_REF_NAME#v}"
          else
            RAW="0.0.0"
          fi
          IFS='.' read -r MA MI PA <<< "$RAW"
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
          CODE=$((10#$MA * 10000 + 10#$MI * 100 + 10#$PA))
          echo "name=$RAW" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Version $RAW -> versionCode $CODE"

      - name: Run unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest --no-daemon

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::SIGNING_KEYSTORE_B64 is not set — a release must be signed."
            exit 1
          fi
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build release APK
        env:
          # Passed in the environment rather than as -P flags, which would show up in the
          # runner's process list.
          SIGNING_STORE_FILE: ${{ runner.temp }}/release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -PappVersionName=${{ steps.ver.outputs.name }} \
            -PappVersionCode=${{ steps.ver.outputs.code }}

      - name: Stage APK with version name
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk \
            "artifacts/MyTvLauncher-${GITHUB_REF_NAME}.apk"

      - name: Shred the keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.jks"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyTvLauncher-apk
          path: artifacts/*.apk

      - name: Publish release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
